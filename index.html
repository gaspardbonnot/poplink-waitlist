<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Poplink — The Royal Pop. On your wrist.</title>
  <meta name="description" content="The bracelet you've been missing. Join the Poplink waitlist." />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="logo">Poplink</header>

  <main>
    <h1>The Royal Pop. On your wrist.</h1>
    <p class="sub">The bracelet you've been missing.</p>

    <p class="count"><span id="count">2,347</span> people on the waitlist</p>

    <form id="form" novalidate>
      <input id="prenom" name="prenom" type="text" placeholder="First name" autocomplete="given-name" required />
      <input id="email" name="email" type="email" placeholder="Email" autocomplete="email" required />
      <button id="submit" type="submit">Join</button>
      <p class="note">No spam.</p>
    </form>

    <p id="success" class="success" hidden>You're on the list.</p>
  </main>

  <script src="config.js"></script>
  <script type="module" src="app.js"></script>
</body>
</html>
